<script>
  // ===================================================
  //  CONFIG — altere aqui e toda a página se atualiza
  // ===================================================
  const CFG = {
    // Anúncios oficiais de cada kit no Mercado Livre
    anuncios: {
      kit1:      "https://www.mercadolivre.com.br/1-sucupira-naturale-liquida-400ml/up/MLBU3416228056", // 1 garrafa
      mediana:   "https://www.mercadolivre.com.br/3-sucupiras-naturale-liquida-400ml/up/MLBU3416238192", // 3 garrafas
      prevencao: "https://www.mercadolivre.com.br/4-sucupiras-naturale-liquida-400ml/up/MLBU3416238212", // 4 garrafas
      aguda:     "https://www.mercadolivre.com.br/6-sucupiras-naturale-liquida-400ml/up/MLBU3409707429" // 6 garrafas
    }
  };

  // Liga cada botão ao anúncio correto no Mercado Livre.
  // Conversao Google Ads: somente estes botoes reais de compra disparam o clique de saida.
  // Links internos como href="#comprar" nao passam por este mapa e nao contam conversao.
  const linksCompra = {
    "btn-kit1":      CFG.anuncios.kit1,
    "btn-mediana":   CFG.anuncios.mediana,
    "btn-aguda":     CFG.anuncios.aguda,
    "btn-prevencao": CFG.anuncios.prevencao
  };

  Object.keys(linksCompra).forEach(function(id) {
    var link = document.getElementById(id);
    if (link) {
      link.href = linksCompra[id];

      link.addEventListener('click', function(e) {
        e.preventDefault();
        return gtag_report_conversion(linksCompra[id]);
      });
    }
  });

  // ===================================================
  //  Balão WhatsApp — aparece após 4s
  // ===================================================
  (function() {
    var balloon = document.getElementById('wpp-balloon-v2');
    if (!balloon) return;
    var shown = false;
    function showBalloon() {
      if (shown) return;
      shown = true;
      balloon.classList.add('show');
      setTimeout(function() { balloon.classList.remove('show'); }, 6000);
    }
    setTimeout(showBalloon, 4000);
    window.addEventListener('scroll', function() {
      var pct = window.scrollY / Math.max(1, document.body.scrollHeight - window.innerHeight);
      if (pct > 0.3) showBalloon();
    }, { passive: true });
  })();

  // ===================================================
  //  Carrossel automático dos kits (mobile only)
  // ===================================================
  (function() {
    var grid = document.querySelector('.kits-grid');
    if (!grid) return;

    var interval = null;
    var paused = false;
    var DELAY = 3000;

    function getCardWidth() {
      var card = grid.querySelector('.kit-card');
      if (!card) return 0;
      var gap = parseInt(getComputedStyle(grid).gap) || 16;
      return card.offsetWidth + gap;
    }

    function nextSlide() {
      if (paused) return;
      var cardWidth = getCardWidth();
      if (!cardWidth) return;
      var maxScroll = grid.scrollWidth - grid.clientWidth;
      if (grid.scrollLeft >= maxScroll - 4) {
        grid.scrollTo({ left: 0, behavior: 'smooth' });
      } else {
        grid.scrollTo({ left: grid.scrollLeft + cardWidth, behavior: 'smooth' });
      }
    }

    function startAuto() {
      if (interval) return;
      interval = setInterval(nextSlide, DELAY);
    }

    function stopAuto() {
      clearInterval(interval);
      interval = null;
    }

    // Pausa ao tocar, retoma após 6s
    grid.addEventListener('touchstart', function() {
      paused = true;
      stopAuto();
    }, { passive: true });

    grid.addEventListener('touchend', function() {
      setTimeout(function() {
        paused = false;
        startAuto();
      }, 6000);
    }, { passive: true });

    // Só ativa no mobile
    function checkMobile() {
      if (window.innerWidth <= 767) {
        startAuto();
      } else {
        stopAuto();
      }
    }

    checkMobile();
    window.addEventListener('resize', checkMobile);
  })();

  // ===================================================
  //  Setas do carrossel de kits
  // ===================================================
  (function() {
    var grid = document.querySelector('.kits-grid');
    var btnPrev = document.querySelector('.kit-arrow-prev');
    var btnNext = document.querySelector('.kit-arrow-next');
    if (!grid || !btnPrev || !btnNext) return;

    function cardWidth() {
      var card = grid.querySelector('.kit-card');
      if (!card) return 0;
      var gap = parseInt(getComputedStyle(grid).gap) || 16;
      return card.offsetWidth + gap;
    }

    btnPrev.addEventListener('click', function() {
      grid.scrollBy({ left: -cardWidth(), behavior: 'smooth' });
    });
    btnNext.addEventListener('click', function() {
      grid.scrollBy({ left: cardWidth(), behavior: 'smooth' });
    });
  })();

  // ===================================================
  //  Carrossel automático dos depoimentos (mobile only)
  // ===================================================
  (function() {
    var grid = document.querySelector('.depo-grid');
    if (!grid) return;

    var interval = null;
    var paused = false;
    var DELAY = 3500;

    function getCardWidth() {
      var card = grid.querySelector('.depo-card');
      if (!card) return 0;
      var gap = parseInt(getComputedStyle(grid).gap) || 16;
      return card.offsetWidth + gap;
    }

    function nextSlide() {
      if (paused) return;
      var cardWidth = getCardWidth();
      if (!cardWidth) return;
      var maxScroll = grid.scrollWidth - grid.clientWidth;
      var next = grid.scrollLeft + cardWidth;
      if (next >= maxScroll - 4) {
        grid.scrollTo({ left: 0, behavior: 'smooth' });
      } else {
        grid.scrollTo({ left: next, behavior: 'smooth' });
      }
    }

    function startAuto() {
      if (interval) return;
      interval = setInterval(nextSlide, DELAY);
    }

    function stopAuto() {
      clearInterval(interval);
      interval = null;
    }

    grid.addEventListener('touchstart', function() {
      paused = true;
      stopAuto();
    }, { passive: true });

    grid.addEventListener('touchend', function() {
      setTimeout(function() {
        paused = false;
        startAuto();
      }, 6000);
    }, { passive: true });

    function checkMobile() {
      if (window.innerWidth <= 767) {
        startAuto();
      } else {
        stopAuto();
      }
    }

    checkMobile();
    window.addEventListener('resize', checkMobile);
  })();

  // ===================================================
  //  FAQ Accordion
  // ===================================================
  function toggleFaq(btn) {
    var answer = btn.nextElementSibling;
    var isOpen = btn.classList.contains("open");

    // Fecha todos
    document.querySelectorAll(".faq-question.open").forEach(function(q) {
      q.classList.remove("open");
      q.nextElementSibling.classList.remove("open");
    });

    // Abre o clicado (se não estava aberto)
    if (!isOpen) {
      btn.classList.add("open");
      answer.classList.add("open");
    }
  }
</script>
